# Primary font family
font-family = Maple Mono NF CN

# Maple Mono NF CN already includes CJK glyphs, so no separate CJK font is needed

# Font size in points
font-size = 18

# Thicker font strokes on macOS Retina displays for better readability
# font-thicken = true

# Increase line height slightly for better readability
adjust-cell-height = 1
