# Custom prompt
[character]
success_symbol = "[¤Ç](bold green)"
error_symbol = "[¤Ç](bold red)"

[cmd_duration]
min_time = 3000
show_milliseconds = false
format = "took [$duration]($style) "

[direnv]
disabled = false
format = "[$loaded]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
ahead = "Ôçí${count}"
behind = "Ôçó${count}"
diverged = "Ôçí${ahead_count}Ôçó${behind_count}"

